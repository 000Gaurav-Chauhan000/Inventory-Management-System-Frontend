<div class="flex min-h-screen items-center justify-center px-4 py-10">
  <div class="w-full max-w-md overflow-hidden rounded-[2rem] bg-white shadow-panel">
    <section class="px-8 py-12 sm:px-12">
      <p class="text-xs font-semibold uppercase tracking-[0.26em] text-coral">Welcome back</p>
      <h2 class="mt-3 text-4xl">Login</h2>
      <p class="mt-2 text-sm text-ink-600">
        New to StockPro? 
        <a class="font-semibold text-coral" routerLink="/signup">
          Create an account
        </a>
      </p>

      <form class="mt-8 space-y-4" (ngSubmit)="handleSubmit()" #loginForm="ngForm">
        <div>
          <label class="mb-2 block text-sm font-medium text-ink-700">Email</label>
          <input
            required
            type="email"
            name="email"
            [(ngModel)]="form.email"
          />
        </div>
        <div>
          <label class="mb-2 block text-sm font-medium text-ink-700">Password</label>
          <input
            required
            type="password"
            name="password"
            [(ngModel)]="form.password"
          />
        </div>
        <button class="primary-btn w-full" [disabled]="loading() || !loginForm.valid" type="submit">
          {{ loading() ? 'Signing in...' : 'Login' }}
        </button>
      </form>
    </section>
  </div>
</div>
